name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e '.[dev]'
      - run: python -m unittest discover -s tests -v
      - run: python scripts/validate_repo.py
      - run: python -m compileall -q src scripts mcp skills

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/*.sh

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      - name: Reject placeholder media and broken base paths
        run: |
          ! rg -i 'unsplash|picsum|placeholder\.com|placehold\.co|dummyimage' site/dist
          test -f site/dist/index.html
          test -f site/dist/en/index.html
          test -f site/dist/docs/index.html

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugin/package-lock.json
      - run: npm ci
        working-directory: plugin
      - run: npx tsc --noEmit
        working-directory: plugin
      - run: npm test
        working-directory: plugin
      - run: npm run build
        working-directory: plugin
